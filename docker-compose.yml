services:

  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./php/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  php:
    build: ./php
    container_name: php_app
    depends_on:
      - db
    volumes:
      - ./php:/var/www/html
      - vendor:/var/www/html/vendor

  nginx:
    image: nginx:latest
    volumes:
      - ./php:/var/www/html
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - php
    ports:
      - "8000:80"

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  db_data:
  vendor: